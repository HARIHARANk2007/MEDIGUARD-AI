version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: chatapp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - chatapp-network

  app:
    build: .
    container_name: chatapp
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/chatapp
      - SESSION_SECRET=your-secret-key-change-in-production
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - chatapp-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  chatapp-network:
    driver: bridge